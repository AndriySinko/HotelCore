version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotelcore
      POSTGRES_USER: hotelcore
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotelcore_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/HotelCore.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=hotelcore;Username=hotelcore;Password=${DB_PASSWORD:-hotelcore_dev}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: HotelCore
      Jwt__Audience: HotelCoreClient
      Jwt__ExpiryHours: "8"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:5000}
    ports:
      - "80:80"

volumes:
  pg_data:
